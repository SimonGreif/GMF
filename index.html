<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a0a2e">
<title>Guess My Fart 💨</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

:root {
–bg: #1a0a2e;
–card: #2d1a4a;
–yellow: #ffe94d;
–orange: #ff8c42;
–pink: #ff4fa3;
–green: #4dffb4;
–blue: #4db8ff;
–purple: #c94dff;
}

html {
background: #1a0a2e;
}

body {
font-family: ‘Nunito’, ‘Arial Rounded MT Bold’, Arial, sans-serif;
background: #1a0a2e;
min-height: 100vh;
min-height: 100dvh;
display: flex;
flex-direction: column;
align-items: center;
justify-content: space-between;
overflow: hidden;
position: relative;
padding: 20px 16px 30px;
}

.blob {
position: fixed;
border-radius: 50%;
filter: blur(80px);
opacity: 0.18;
pointer-events: none;
animation: blobFloat 8s ease-in-out infinite alternate;
}
.blob1 { width: 300px; height: 300px; background: var(–purple); top: -80px; left: -80px; }
.blob2 { width: 250px; height: 250px; background: var(–pink); bottom: -60px; right: -60px; animation-delay: 2s; }
.blob3 { width: 200px; height: 200px; background: var(–green); top: 40%; left: 50%; animation-delay: 4s; }

@keyframes blobFloat {
0% { transform: translate(0,0) scale(1); }
100% { transform: translate(30px, 20px) scale(1.1); }
}

.header {
text-align: center;
position: relative;
z-index: 10;
}
.title {
font-family: ‘Fredoka One’, ‘Arial Rounded MT Bold’, Arial, cursive;
font-size: clamp(2rem, 8vw, 3rem);
color: var(–yellow);
text-shadow: 0 0 30px rgba(255,233,77,0.5), 3px 3px 0 rgba(0,0,0,0.4);
line-height: 1.1;
}
.subtitle {
font-size: clamp(0.75rem, 3vw, 0.9rem);
color: rgba(255,255,255,0.5);
margin-top: 4px;
font-weight: 700;
letter-spacing: 2px;
text-transform: uppercase;
}

#statusBar {
font-size: 0.7rem;
padding: 4px 12px;
border-radius: 20px;
margin-top: 8px;
font-weight: 700;
letter-spacing: 1px;
display: inline-block;
transition: all 0.3s;
}
.s-warn { background: rgba(255,233,77,0.15); color: var(–yellow); border: 1px solid rgba(255,233,77,0.3); }
.s-ok   { background: rgba(77,255,180,0.15); color: var(–green);  border: 1px solid rgba(77,255,180,0.3); }
.s-err  { background: rgba(255,79,163,0.15);  color: var(–pink);   border: 1px solid rgba(255,79,163,0.3); }

.sound-display {
position: relative;
z-index: 10;
text-align: center;
min-height: 80px;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
gap: 6px;
}
.sound-label {
font-size: 0.7rem;
letter-spacing: 3px;
text-transform: uppercase;
color: rgba(255,255,255,0.35);
font-weight: 700;
}
.sound-name {
font-family: ‘Fredoka One’, cursive;
font-size: clamp(1.4rem, 5vw, 2rem);
color: white;
transition: all 0.3s ease;
opacity: 0;
transform: translateY(10px);
}
.sound-name.visible { opacity: 1; transform: translateY(0); }
.sound-emoji {
font-size: 2rem;
opacity: 0;
transform: scale(0);
transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.sound-emoji.visible { opacity: 1; transform: scale(1); }

.button-area {
position: relative;
z-index: 10;
display: flex;
align-items: center;
justify-content: center;
}

.fart-ring {
position: absolute;
border-radius: 50%;
border: 3px solid var(–yellow);
opacity: 0;
pointer-events: none;
}
.fart-ring.animate { animation: ringPulse 0.8s ease-out forwards; }
@keyframes ringPulse {
0%  { width: 160px; height: 160px; opacity: 0.7; }
100%{ width: 340px; height: 340px; opacity: 0; }
}

.fart-btn {
width: 180px;
height: 180px;
border-radius: 50%;
border: none;
cursor: pointer;
position: relative;
background: radial-gradient(circle at 35% 35%, #ffe97a, #ff8c42 60%, #ff5500);
box-shadow:
0 0 0 6px rgba(255,233,77,0.2),
0 0 40px rgba(255,140,66,0.4),
0 8px 32px rgba(0,0,0,0.5),
inset 0 -6px 20px rgba(0,0,0,0.3),
inset 0 6px 20px rgba(255,255,255,0.2);
transition: transform 0.1s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.1s ease;
-webkit-user-select: none;
user-select: none;
touch-action: manipulation;
}
.fart-btn:active {
transform: scale(0.88) !important;
box-shadow: 0 0 0 4px rgba(255,233,77,0.1), 0 4px 16px rgba(0,0,0,0.5);
}
.fart-btn.shake { animation: btnShake 0.5s ease-out; }
@keyframes btnShake {
0%,100% { transform: scale(1) rotate(0deg); }
15% { transform: scale(1.08) rotate(-3deg); }
30% { transform: scale(1.05) rotate(3deg); }
50% { transform: scale(1.02) rotate(-2deg); }
75% { transform: scale(1.01) rotate(1deg); }
}
.btn-inner {
font-size: 3.5rem;
display: flex; align-items: center; justify-content: center;
height: 100%;
animation: btnBreathe 3s ease-in-out infinite;
pointer-events: none;
}
@keyframes btnBreathe {
0%,100% { transform: scale(1); }
50% { transform: scale(1.06); }
}

.particles {
position: fixed; top: 0; left: 0;
width: 100%; height: 100%;
pointer-events: none; z-index: 20; overflow: hidden;
}
.particle {
position: absolute; border-radius: 50%;
pointer-events: none;
animation: particleFly 0.9s ease-out forwards;
}
@keyframes particleFly {
0%   { opacity: 1; transform: translate(0,0) scale(1); }
100% { opacity: 0; transform: translate(var(–tx), var(–ty)) scale(0); }
}

.counter-area {
position: relative; z-index: 10;
display: flex; flex-direction: column;
align-items: center; gap: 8px;
}
.counter-label {
font-size: 0.65rem; letter-spacing: 3px;
text-transform: uppercase;
color: rgba(255,255,255,0.3); font-weight: 700;
}
.counter-pills {
display: flex; gap: 6px; flex-wrap: wrap;
justify-content: center; max-width: 300px;
}
.pill {
font-family: ‘Fredoka One’, cursive;
font-size: 0.72rem; padding: 4px 10px;
border-radius: 20px;
background: rgba(255,255,255,0.07);
color: rgba(255,255,255,0.4);
border: 1px solid rgba(255,255,255,0.1);
transition: all 0.3s ease;
white-space: nowrap;
}
.pill.active {
background: rgba(255,233,77,0.15);
color: var(–yellow);
border-color: rgba(255,233,77,0.4);
box-shadow: 0 0 12px rgba(255,233,77,0.2);
}

.cloud {
position: fixed; pointer-events: none;
font-size: 2rem; opacity: 0; z-index: 5;
animation: cloudFloat 3s ease-out forwards;
}
@keyframes cloudFloat {
0%   { opacity: 0.8; transform: translateY(0) scale(0.5); }
100% { opacity: 0;   transform: translateY(-200px) scale(1.5); }
}
</style>

</head>
<body>

<div class="blob blob1"></div>
<div class="blob blob2"></div>
<div class="blob blob3"></div>
<div class="particles" id="particles"></div>

<header class="header">
  <div class="title">💨 Guess My Fart</div>
  <div class="subtitle">tap to rip one</div>
  <div id="statusBar" class="s-warn">tap the button to start</div>
</header>

<div class="sound-display">
  <div class="sound-emoji" id="soundEmoji">💨</div>
  <div class="sound-label" id="soundLabel">—</div>
  <div class="sound-name" id="soundName"></div>
</div>

<div class="button-area">
  <div class="fart-ring" id="ring1"></div>
  <div class="fart-ring" id="ring2"></div>
  <div class="fart-ring" id="ring3"></div>
  <button class="fart-btn" id="fartBtn" aria-label="Play fart sound">
    <div class="btn-inner">💩</div>
  </button>
</div>

<footer style="position:relative;z-index:10;text-align:center;font-size:0.6rem;color:rgba(255,255,255,0.2);letter-spacing:1px;">
  Created by Šimi based on an idea with Pepé
</footer>

<div class="counter-area">
  <div class="counter-label" id="counterLabel">ready to rip</div>
  <div class="counter-pills" id="pills"></div>
</div>

<script>
(function() {
  'use strict';

  // ── Audio helpers ──────────────────────────────────────────────────────────
  let audioCtx = null;
  let masterGain = null;

  function getCtx() {
    if (!audioCtx) {
      try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        masterGain = audioCtx.createGain();
        masterGain.gain.value = 3.0;
        masterGain.connect(audioCtx.destination);
      } catch(e) {
        setStatus('err', '❌ Web Audio not supported');
        return null;
      }
    }
    return audioCtx;
  }

  function dest() {
    return masterGain || audioCtx.destination;
  }

  function noise(ctx, t0, dur, vol, lo, hi) {
    var n = Math.ceil(ctx.sampleRate * dur);
    var buf = ctx.createBuffer(1, n, ctx.sampleRate);
    var d = buf.getChannelData(0);
    for (var i = 0; i < n; i++) d[i] = Math.random() * 2 - 1;
    var src = ctx.createBufferSource();
    src.buffer = buf;
    var filt = ctx.createBiquadFilter();
    filt.type = 'bandpass';
    filt.frequency.value = (lo + hi) / 2;
    filt.Q.value = 0.7;
    var g = ctx.createGain();
    g.gain.setValueAtTime(vol, t0);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    src.connect(filt); filt.connect(g); g.connect(dest());
    src.start(t0); src.stop(t0 + dur + 0.05);
  }

  function tone(ctx, t0, type, fStart, fEnd, dur, vol) {
    var o = ctx.createOscillator();
    var g = ctx.createGain();
    o.type = type;
    o.frequency.setValueAtTime(fStart, t0);
    if (fEnd) o.frequency.exponentialRampToValueAtTime(fEnd, t0 + dur);
    g.gain.setValueAtTime(vol, t0);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    o.connect(g); g.connect(dest());
    o.start(t0); o.stop(t0 + dur + 0.05);
  }

  // ── Helper: tremolo fart core ─────────────────────────────────────────────
  // baseFreq: fundamental Hz, tremRate: wobble speed, dur: seconds
  // This is the key to realistic farts: amplitude-modulated low noise + sawtooth
  function fartCore(ctx, t, baseFreq, tremRate, dur, vol) {
    // Noise layer (the "air/breath" component)
    var n = Math.ceil(ctx.sampleRate * dur);
    var buf = ctx.createBuffer(1, n, ctx.sampleRate);
    var d = buf.getChannelData(0);
    for (var i = 0; i < n; i++) d[i] = Math.random() * 2 - 1;
    var nSrc = ctx.createBufferSource();
    nSrc.buffer = buf;
    var nFilt = ctx.createBiquadFilter();
    nFilt.type = 'bandpass';
    nFilt.frequency.value = baseFreq * 1.5;
    nFilt.Q.value = 1.2;
    var nGain = ctx.createGain();
    nGain.gain.setValueAtTime(vol * 0.4, t);
    nGain.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    nSrc.connect(nFilt); nFilt.connect(nGain); nGain.connect(dest());
    nSrc.start(t); nSrc.stop(t + dur + 0.05);

    // Oscillator layer (the "body" tone)
    var osc = ctx.createOscillator();
    osc.type = 'sawtooth';
    osc.frequency.value = baseFreq;

    // LFO for tremolo (creates the "brrrp" flutter)
    var lfo = ctx.createOscillator();
    var lfoGain = ctx.createGain();
    lfo.frequency.value = tremRate;
    lfoGain.gain.value = vol * 0.5;
    lfo.connect(lfoGain);

    var oscGain = ctx.createGain();
    oscGain.gain.setValueAtTime(vol * 0.6, t);
    oscGain.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    lfoGain.connect(oscGain.gain);

    osc.connect(oscGain); oscGain.connect(dest());
    lfo.start(t); osc.start(t);
    osc.stop(t + dur + 0.05); lfo.stop(t + dur + 0.05);
  }

  // ── Sound definitions ──────────────────────────────────────────────────────
  var SOUNDS = [
    {
      name: 'The Classic', emoji: '💨', color: '#ffe94d',
      fn: function(ctx) {
        // Standard medium fart: starts strong, tapers off
        var t = ctx.currentTime;
        var o = ctx.createOscillator();
        var lfo = ctx.createOscillator();
        var lfoG = ctx.createGain();
        var g = ctx.createGain();
        o.type = 'sawtooth';
        o.frequency.setValueAtTime(120, t);
        o.frequency.exponentialRampToValueAtTime(75, t + 0.7);
        lfo.frequency.value = 28; lfoG.gain.value = 0.4;
        lfo.connect(lfoG); lfoG.connect(g.gain);
        g.gain.setValueAtTime(0.7, t);
        g.gain.exponentialRampToValueAtTime(0.0001, t + 0.7);
        o.connect(g); g.connect(dest());
        noise(ctx, t, 0.7, 0.5, 80, 400);
        lfo.start(t); o.start(t); o.stop(t + 0.75); lfo.stop(t + 0.75);
      }
    },
    {
      name: 'The Ripper', emoji: '💥', color: '#ff4fa3',
      fn: function(ctx) {
        // Short, explosive, loud – high pressure release
        var t = ctx.currentTime;
        var o = ctx.createOscillator();
        var lfo = ctx.createOscillator();
        var lfoG = ctx.createGain();
        var g = ctx.createGain();
        o.type = 'sawtooth';
        o.frequency.setValueAtTime(160, t);
        o.frequency.exponentialRampToValueAtTime(60, t + 0.35);
        lfo.frequency.value = 55; lfoG.gain.value = 0.5;
        lfo.connect(lfoG); lfoG.connect(g.gain);
        g.gain.setValueAtTime(0.9, t);
        g.gain.exponentialRampToValueAtTime(0.0001, t + 0.35);
        o.connect(g); g.connect(dest());
        noise(ctx, t, 0.35, 0.8, 100, 800);
        lfo.start(t); o.start(t); o.stop(t + 0.4); lfo.stop(t + 0.4);
      }
    },
    {
      name: 'The Long One', emoji: '😮‍💨', color: '#4db8ff',
      fn: function(ctx) {
        // Slow, sustained, trailing off – the "sigh" fart
        var t = ctx.currentTime;
        var o = ctx.createOscillator();
        var lfo = ctx.createOscillator();
        var lfoG = ctx.createGain();
        var g = ctx.createGain();
        o.type = 'sawtooth';
        o.frequency.setValueAtTime(100, t);
        o.frequency.linearRampToValueAtTime(110, t + 0.5);
        o.frequency.exponentialRampToValueAtTime(55, t + 2.2);
        lfo.frequency.value = 18; lfoG.gain.value = 0.3;
        lfo.connect(lfoG); lfoG.connect(g.gain);
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(0.65, t + 0.1);
        g.gain.setValueAtTime(0.55, t + 1.5);
        g.gain.exponentialRampToValueAtTime(0.0001, t + 2.2);
        o.connect(g); g.connect(dest());
        noise(ctx, t, 2.2, 0.35, 60, 300);
        lfo.start(t); o.start(t); o.stop(t + 2.25); lfo.stop(t + 2.25);
      }
    },
    {
      name: 'The Squeaker', emoji: '🐭', color: '#c94dff',
      fn: function(ctx) {
        // Very brief, high-pitched – clenched cheeks
        var t = ctx.currentTime;
        var o = ctx.createOscillator();
        var lfo = ctx.createOscillator();
        var lfoG = ctx.createGain();
        var g = ctx.createGain();
        o.type = 'sawtooth';
        o.frequency.setValueAtTime(320, t);
        o.frequency.exponentialRampToValueAtTime(180, t + 0.18);
        lfo.frequency.value = 45; lfoG.gain.value = 0.4;
        lfo.connect(lfoG); lfoG.connect(g.gain);
        g.gain.setValueAtTime(0.6, t);
        g.gain.exponentialRampToValueAtTime(0.0001, t + 0.18);
        o.connect(g); g.connect(dest());
        noise(ctx, t, 0.18, 0.4, 200, 900);
        lfo.start(t); o.start(t); o.stop(t + 0.22); lfo.stop(t + 0.22);
      }
    },
    {
      name: 'The Wet One', emoji: '💦', color: '#4dffb4',
      fn: function(ctx) {
        // Moist, bubbling – lots of high noise, interrupted tone
        var t = ctx.currentTime;
        noise(ctx, t, 0.9, 0.7, 150, 1200);
        // Interrupted bursts simulating liquid bubbles
        [0, 0.08, 0.17, 0.27, 0.38, 0.5, 0.63, 0.75].forEach(function(dt, i) {
          var o = ctx.createOscillator();
          var g = ctx.createGain();
          o.type = 'sawtooth';
          o.frequency.value = 130 - i * 5;
          var bDur = 0.06 + Math.random() * 0.04;
          g.gain.setValueAtTime(0.5, t + dt);
          g.gain.exponentialRampToValueAtTime(0.0001, t + dt + bDur);
          o.connect(g); g.connect(dest());
          o.start(t + dt); o.stop(t + dt + bDur + 0.02);
        });
      }
    },
    {
      name: 'The Silent Killer', emoji: '☠️', color: '#aaaaaa',
      fn: function(ctx) {
        // Almost inaudible low rumble – you know it's there
        var t = ctx.currentTime;
        noise(ctx, t, 3.5, 0.12, 20, 90);
        var o = ctx.createOscillator();
        var g = ctx.createGain();
        o.type = 'sine'; o.frequency.value = 45;
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(0.18, t + 0.8);
        g.gain.setValueAtTime(0.15, t + 2.5);
        g.gain.linearRampToValueAtTime(0, t + 3.5);
        o.connect(g); g.connect(dest());
        o.start(t); o.stop(t + 3.6);
      }
    },
    {
      name: 'The Machine Gun', emoji: '🔫', color: '#ff8c42',
      fn: function(ctx) {
        // Rapid-fire short bursts – cheeks flapping
        var t = ctx.currentTime;
        var gaps = [0, 0.11, 0.21, 0.30, 0.38, 0.45, 0.51, 0.56, 0.60, 0.63];
        gaps.forEach(function(dt, i) {
          var o = ctx.createOscillator();
          var lfo = ctx.createOscillator();
          var lfoG = ctx.createGain();
          var g = ctx.createGain();
          o.type = 'sawtooth';
          o.frequency.value = 140 - i * 8;
          lfo.frequency.value = 40; lfoG.gain.value = 0.3;
          lfo.connect(lfoG); lfoG.connect(g.gain);
          var bDur = 0.07;
          g.gain.setValueAtTime(0.6, t + dt);
          g.gain.exponentialRampToValueAtTime(0.0001, t + dt + bDur);
          o.connect(g); g.connect(dest());
          noise(ctx, t + dt, bDur, 0.4, 80, 500);
          lfo.start(t + dt); o.start(t + dt);
          o.stop(t + dt + bDur + 0.02); lfo.stop(t + dt + bDur + 0.02);
        });
      }
    },
    {
      name: 'The Rumbler', emoji: '🌋', color: '#ff8c42',
      fn: function(ctx) {
        // Deep, prolonged, belly-shaking
        var t = ctx.currentTime;
        noise(ctx, t, 2.5, 0.4, 30, 150);
        var o = ctx.createOscillator();
        var lfo = ctx.createOscillator();
        var lfoG = ctx.createGain();
        var g = ctx.createGain();
        o.type = 'sawtooth'; o.frequency.value = 70;
        o.frequency.setValueAtTime(70, t);
        o.frequency.linearRampToValueAtTime(80, t + 0.6);
        o.frequency.exponentialRampToValueAtTime(50, t + 2.5);
        lfo.frequency.value = 14; lfoG.gain.value = 0.45;
        lfo.connect(lfoG); lfoG.connect(g.gain);
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(0.7, t + 0.25);
        g.gain.setValueAtTime(0.65, t + 1.8);
        g.gain.exponentialRampToValueAtTime(0.0001, t + 2.5);
        o.connect(g); g.connect(dest());
        lfo.start(t); o.start(t); o.stop(t + 2.55); lfo.stop(t + 2.55);
      }
    },
    {
      name: 'The Surprise', emoji: '😱', color: '#ffe94d',
      fn: function(ctx) {
        // Unexpected – starts tiny then BLASTS
        var t = ctx.currentTime;
        var o = ctx.createOscillator();
        var lfo = ctx.createOscillator();
        var lfoG = ctx.createGain();
        var g = ctx.createGain();
        o.type = 'sawtooth';
        o.frequency.setValueAtTime(200, t);
        o.frequency.exponentialRampToValueAtTime(80, t + 0.6);
        lfo.frequency.value = 35; lfoG.gain.value = 0.4;
        lfo.connect(lfoG); lfoG.connect(g.gain);
        g.gain.setValueAtTime(0.05, t);
        g.gain.linearRampToValueAtTime(0.05, t + 0.15); // quiet start
        g.gain.linearRampToValueAtTime(0.9, t + 0.2);   // BLAST
        g.gain.exponentialRampToValueAtTime(0.0001, t + 0.6);
        o.connect(g); g.connect(dest());
        noise(ctx, t + 0.15, 0.45, 0.7, 80, 600);
        lfo.start(t); o.start(t); o.stop(t + 0.65); lfo.stop(t + 0.65);
      }
    },
    {
      name: 'The Bathtub', emoji: '🛁', color: '#4db8ff',
      fn: function(ctx) {
        // Underwater bubbles – situational classic
        var t = ctx.currentTime;
        for (var i = 0; i < 10; i++) {
          (function(i) {
            var dt = i * 0.13 + Math.random() * 0.06;
            var o = ctx.createOscillator();
            var g = ctx.createGain();
            var filt = ctx.createBiquadFilter();
            filt.type = 'bandpass';
            filt.frequency.value = 300 + Math.random() * 200;
            filt.Q.value = 3;
            o.type = 'sine';
            var f = 90 + Math.random() * 60;
            o.frequency.setValueAtTime(f * 1.3, t + dt);
            o.frequency.exponentialRampToValueAtTime(f, t + dt + 0.12);
            var bVol = 0.5 - i * 0.03;
            g.gain.setValueAtTime(bVol, t + dt);
            g.gain.exponentialRampToValueAtTime(0.0001, t + dt + 0.15);
            o.connect(filt); filt.connect(g); g.connect(dest());
            o.start(t + dt); o.stop(t + dt + 0.18);
            noise(ctx, t + dt, 0.12, 0.2, 200, 800);
          })(i);
        }
      }
    },
    {
      name: 'The Office Chair', emoji: '🪑', color: '#c94dff',
      fn: function(ctx) {
        // Leather seat squeak + fart ambiguity
        var t = ctx.currentTime;
        // Chair squeak (high friction tone)
        var sq = ctx.createOscillator();
        var sqG = ctx.createGain();
        sq.type = 'sawtooth';
        sq.frequency.setValueAtTime(380, t);
        sq.frequency.linearRampToValueAtTime(420, t + 0.05);
        sq.frequency.linearRampToValueAtTime(360, t + 0.12);
        sqG.gain.setValueAtTime(0.3, t);
        sqG.gain.exponentialRampToValueAtTime(0.0001, t + 0.18);
        sq.connect(sqG); sqG.connect(dest());
        sq.start(t); sq.stop(t + 0.2);
        // Then the real fart underneath
        var o = ctx.createOscillator();
        var lfo = ctx.createOscillator();
        var lfoG = ctx.createGain();
        var g = ctx.createGain();
        o.type = 'sawtooth'; o.frequency.value = 110;
        o.frequency.exponentialRampToValueAtTime(70, t + 0.5);
        lfo.frequency.value = 30; lfoG.gain.value = 0.35;
        lfo.connect(lfoG); lfoG.connect(g.gain);
        g.gain.setValueAtTime(0.55, t + 0.05);
        g.gain.exponentialRampToValueAtTime(0.0001, t + 0.55);
        o.connect(g); g.connect(dest());
        noise(ctx, t + 0.05, 0.5, 0.4, 80, 400);
        lfo.start(t); o.start(t); o.stop(t + 0.58); lfo.stop(t + 0.58);
      }
    },
    {
      name: 'The Elevator', emoji: '🛗', color: '#4dffb4',
      fn: function(ctx) {
        // Tiny, embarrassed – full silence around you
        var t = ctx.currentTime;
        var o = ctx.createOscillator();
        var lfo = ctx.createOscillator();
        var lfoG = ctx.createGain();
        var g = ctx.createGain();
        o.type = 'sawtooth';
        o.frequency.setValueAtTime(180, t);
        o.frequency.exponentialRampToValueAtTime(120, t + 0.22);
        lfo.frequency.value = 38; lfoG.gain.value = 0.35;
        lfo.connect(lfoG); lfoG.connect(g.gain);
        g.gain.setValueAtTime(0.45, t);
        g.gain.exponentialRampToValueAtTime(0.0001, t + 0.22);
        o.connect(g); g.connect(dest());
        noise(ctx, t, 0.22, 0.35, 120, 600);
        lfo.start(t); o.start(t); o.stop(t + 0.25); lfo.stop(t + 0.25);
      }
    },
    {
      name: 'The Finale', emoji: '🎆', color: '#ff4fa3',
      fn: function(ctx) {
        // Epic, multi-stage – the grand finale
        var t = ctx.currentTime;
        // Stage 1: build-up rumble
        noise(ctx, t, 0.4, 0.3, 40, 200);
        // Stage 2: main blast
        var o = ctx.createOscillator();
        var lfo = ctx.createOscillator();
        var lfoG = ctx.createGain();
        var g = ctx.createGain();
        o.type = 'sawtooth';
        o.frequency.setValueAtTime(140, t + 0.3);
        o.frequency.exponentialRampToValueAtTime(55, t + 1.4);
        lfo.frequency.value = 32; lfoG.gain.value = 0.5;
        lfo.connect(lfoG); lfoG.connect(g.gain);
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(0.85, t + 0.35);
        g.gain.exponentialRampToValueAtTime(0.0001, t + 1.4);
        o.connect(g); g.connect(dest());
        noise(ctx, t + 0.3, 1.1, 0.65, 70, 500);
        // Stage 3: wet aftershock
        noise(ctx, t + 1.1, 0.4, 0.4, 150, 900);
        lfo.start(t); o.start(t + 0.3); o.stop(t + 1.45); lfo.stop(t + 1.45);
      }
    },
  ];

  // ── State ──────────────────────────────────────────────────────────────────
  var playCount = 0;
  var lastIdx   = -1;
  var busy      = false;

  // ── UI helpers ─────────────────────────────────────────────────────────────
  function setStatus(type, msg) {
    var el = document.getElementById('statusBar');
    el.className = 's-' + type;
    el.textContent = msg;
  }

  function showSoundName(s) {
    var n = document.getElementById('soundName');
    var e = document.getElementById('soundEmoji');
    document.getElementById('soundLabel').textContent = 'You just ripped:';
    n.classList.remove('visible'); e.classList.remove('visible');
    setTimeout(function() {
      n.textContent = s.name;
      n.style.color = s.color;
      e.textContent = s.emoji;
      n.classList.add('visible'); e.classList.add('visible');
    }, 40);
  }

  function animateBtn() {
    var b = document.getElementById('fartBtn');
    b.classList.remove('shake');
    void b.offsetWidth;
    b.classList.add('shake');
    b.addEventListener('animationend', function() { b.classList.remove('shake'); }, { once: true });
  }

  function pulseRings() {
    ['ring1','ring2','ring3'].forEach(function(id, i) {
      var el = document.getElementById(id);
      el.classList.remove('animate');
      void el.offsetWidth;
      setTimeout(function() {
        el.classList.add('animate');
        el.addEventListener('animationend', function() { el.classList.remove('animate'); }, { once: true });
      }, i * 90);
    });
  }

  function spawnParticles(color) {
    var container = document.getElementById('particles');
    var btn = document.getElementById('fartBtn');
    var r = btn.getBoundingClientRect();
    var cx = r.left + r.width / 2;
    var cy = r.top  + r.height / 2;
    var palette = [color, '#ffe94d', '#ff4fa3', '#4dffb4', '#ffffff'];
    for (var i = 0; i < 18; i++) {
      var p  = document.createElement('div');
      p.className = 'particle';
      var sz = 6  + Math.random() * 12;
      var a  = Math.random() * Math.PI * 2;
      var d  = 90 + Math.random() * 160;
      var c  = palette[Math.floor(Math.random() * palette.length)];
      p.style.cssText = 'width:' + sz + 'px;height:' + sz + 'px;background:' + c
        + ';left:' + (cx - sz/2) + 'px;top:' + (cy - sz/2) + 'px'
        + ';--tx:' + (Math.cos(a)*d) + 'px;--ty:' + (Math.sin(a)*d) + 'px'
        + ';animation-duration:' + (0.6 + Math.random()*0.4) + 's';
      container.appendChild(p);
      p.addEventListener('animationend', function() { this.remove(); });
    }
  }

  function spawnClouds() {
    var icons = ['💨','💨','✨','🌿'];
    for (var i = 0; i < 3; i++) {
      (function(delay) {
        setTimeout(function() {
          var c = document.createElement('div');
          c.className = 'cloud';
          c.textContent = icons[Math.floor(Math.random()*icons.length)];
          c.style.left = (15 + Math.random()*65) + '%';
          c.style.top  = (25 + Math.random()*45) + '%';
          c.style.animationDuration = (2 + Math.random()) + 's';
          document.body.appendChild(c);
          c.addEventListener('animationend', function() { c.remove(); });
        }, delay);
      })(i * 140);
    }
  }

  function highlightPill(idx, s) {
    document.querySelectorAll('.pill').forEach(function(p) {
      p.classList.remove('active');
      p.style.cssText = '';
    });
    var p = document.getElementById('pill-' + idx);
    if (p) {
      p.classList.add('active');
      p.style.borderColor = s.color + '88';
      p.style.color       = s.color;
      p.style.background  = s.color + '22';
      setTimeout(function() { p.classList.remove('active'); p.style.cssText = ''; }, 2200);
    }
  }

  function updateCounter() {
    var msgs = ['', 'First blood! 🎉', 'Getting started 👀', 'Warming up 🔥', 'No shame 😂', 'Prolific 💪'];
    var el = document.getElementById('counterLabel');
    if (playCount < msgs.length) el.textContent = msgs[playCount];
    else if (playCount < 15)     el.textContent = playCount + ' rips 💨';
    else if (playCount < 25)     el.textContent = playCount + ' rips 🤢';
    else                         el.textContent = playCount + ' rips — seek help 💀';
  }

  // ── Main play function ─────────────────────────────────────────────────────
  function doPlay() {
    var ctx = getCtx();
    if (!ctx) return;

    var idx;
    do { idx = Math.floor(Math.random() * SOUNDS.length); }
    while (idx === lastIdx && SOUNDS.length > 1);
    lastIdx = idx;

    var s = SOUNDS[idx];
    try {
      s.fn(ctx);
      setStatus('ok', '▶ ' + s.emoji + ' ' + s.name);
    } catch(e) {
      setStatus('err', '❌ ' + e.message);
      console.error(e);
      return;
    }

    playCount++;
    showSoundName(s);
    animateBtn();
    pulseRings();
    spawnParticles(s.color);
    spawnClouds();
    highlightPill(idx, s);
    updateCounter();
  }

  function play() {
    if (busy) return;
    busy = true;
    setTimeout(function() { busy = false; }, 250);

    // Safari iOS: AudioContext must be created/resumed synchronously
    // inside a user gesture handler (touchstart or touchend)
    var AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) { setStatus('err', '❌ Web Audio not supported'); return; }

    if (!audioCtx) {
      try { audioCtx = new AC(); } catch(e) { setStatus('err', '❌ ' + e.message); return; }
    }

    if (audioCtx.state === 'suspended') {
      // resume() must be called synchronously in the gesture, then we play
      audioCtx.resume().then(function() {
        doPlay();
      }).catch(function(e) {
        setStatus('err', '❌ resume: ' + e.message);
      });
    } else {
      doPlay();
    }
  }

  // ── Init ───────────────────────────────────────────────────────────────────
  window.addEventListener('DOMContentLoaded', function() {
    var container = document.getElementById('pills');
    SOUNDS.forEach(function(s, i) {
      var p = document.createElement('div');
      p.className = 'pill';
      p.id = 'pill-' + i;
      p.textContent = s.emoji + ' ' + s.name;
      container.appendChild(p);
    });

    if (!window.AudioContext && !window.webkitAudioContext) {
      setStatus('err', '❌ Web Audio API not supported');
      return;
    }

    var btn = document.getElementById('fartBtn');

    // iOS Safari requires touch events, not just click
    btn.addEventListener('touchstart', function(e) {
      e.preventDefault(); // prevent double-firing with click
      play();
    }, { passive: false });

    // Fallback for desktop / non-touch
    btn.addEventListener('click', function(e) {
      // Only fire if not already triggered by touch
      if (!('ontouchstart' in window)) play();
    });

    document.addEventListener('keydown', function(e) {
      if (e.code === 'Space' || e.code === 'Enter') { e.preventDefault(); play(); }
    });
  });

})();
</script>
